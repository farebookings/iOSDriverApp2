name: iOS Build (Compile Only)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List available schemes (for debugging)
      run: xcodebuild -list -project iOSDriverApp.xcodeproj

    - name: Build iOS app
      run: |
        xcodebuild clean build \
          -project iOSDriverApp.xcodeproj \
          -scheme iOSDriverApp \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          CODE_SIGNING_ALLOWED=NO
